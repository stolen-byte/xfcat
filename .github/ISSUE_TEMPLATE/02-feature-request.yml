name: Feature Request
description: Request a feature
title: "[Feature Request]: "
labels: ["feature"]
assignees:
  - stolen-byte
body:
  - type: checkboxes
    id: confirm
    attributes:
      # useless required duplication yay?
      label: New Feature
      description: Please confirm you have checked that this feature has not been implemented by an update (including unmerged PR's).
      options:
        - label: I Confirm
          required: true

  - type: textarea
    attributes:
      label: Problem Related?
      description: Is your feature request related to a problem? If so, please describe.
      value: N/A
    validations:
      required: false

  - type: textarea
    attributes:
      label: Summary
      description: Please describe, clearly, what you would like to see.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives?
      description: Describe any alternative solutions or features you've considered.
      value: N/A
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context about the feature request here.
      value: N/A
    validations:
      required: false
